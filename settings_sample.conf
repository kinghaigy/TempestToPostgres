# =============================================================================
# Tempest Weather Station Logger – Sample Configuration
# =============================================================================
# Copy this file to settings.conf and fill in your values.
# settings.conf is excluded from version control so your credentials are safe.
#
#   cp settings_sample.conf settings.conf
# =============================================================================

[database]
# Full PostgreSQL connection URL.
# Format: postgresql://user:password@host:port/database
connection_url = postgresql://username:password@localhost:5432/weather

# =============================================================================
[table]
# The table to insert observations into.
# The table must already exist – see the example DDL in README.md.
name = weather_observations

# =============================================================================
[static_fields]
# Constant values inserted into every row, keyed by the DB column name.
# Use this for columns that aren't in the Tempest data (e.g. identifiers).
# Values are always treated as strings; PostgreSQL will coerce to the column type.
# asset_id = outside
# site     = rooftop

# =============================================================================
[units]
# Units for values stored in the database.
#
# wind_speed: m/s | kph | knots | mph
#   The Tempest reports wind in m/s; set your preferred storage unit here.
wind_speed = kph

# =============================================================================
[column_mapping]
# Maps the logger's internal field names (left) to your database column names
# (right).  All eight keys are required.
#
# Internal name       → your DB column
# ──────────────────────────────────────
# timestamp           observation timestamp (UTC, timestamptz)
# wind_average        wind speed averaged over the reporting interval (m/s)
# wind_direction      wind direction (degrees, 0–360)
# air_temperature     air temperature (°C)
# relative_humidity   relative humidity (%)
# solar_radiation     solar radiation (W/m²)
# daily_rain          accumulated rainfall since 09:00 local time (mm)
# voltage             Tempest battery voltage from the last device_status (V)
# ──────────────────────────────────────
timestamp         = recorded_at
wind_average      = wind_avg_ms
wind_direction    = wind_dir_deg
air_temperature   = air_temp_c
relative_humidity = rel_humidity_pct
solar_radiation   = solar_rad_wm2
daily_rain        = daily_rain_mm
voltage           = battery_volts

# ---------------------------------------------------------------------------
# Optional extra fields – uncomment and set a column name to enable.
# The column must already exist in your table.
# ---------------------------------------------------------------------------
# serial_number    = device_serial
# hub_sn           = hub_serial
# firmware_revision = firmware_rev
